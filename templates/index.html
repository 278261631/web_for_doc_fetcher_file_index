<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocFetcher - Code Search</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <!-- 顶部菜单栏 -->
        <div class="menu-bar">
            <div class="menu-item" onclick="showIndexDialog()">File</div>
            <div class="menu-item" onclick="document.getElementById('searchInput').focus()">Edit</div>
            <div class="menu-item" onclick="toggleSidebar()">View</div>
            <div class="menu-item">Navigate</div>
            <div class="menu-item">Run</div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="toolbar-group">
                <button class="toolbar-btn" title="Build Index" onclick="showIndexDialog()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm1 10H7V7h2v4zm0-6H7V3h2v2z"/></svg>
                    Index Project
                </button>
            </div>
            <div class="toolbar-group">
                <button class="toolbar-btn" title="Find in Files (Ctrl+Shift+F)" onclick="document.getElementById('searchInput').focus()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 10-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 001.415-1.414l-3.85-3.85a1.007 1.007 0 00-.115-.1zM12 6.5a5.5 5.5 0 11-11 0 5.5 5.5 0 0111 0z"/></svg>
                </button>
            </div>
            <div class="toolbar-spacer"></div>
            <div class="toolbar-group">
                <span id="statusIndicator" class="status-dot"></span>
                <span id="statusText" class="status-text">Not indexed</span>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧项目面板 -->
            <div id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Project</span>
                    <div class="sidebar-actions">
                        <button class="sidebar-btn" title="Collapse All" onclick="collapseAll()">⊟</button>
                        <button class="sidebar-btn" title="Expand All" onclick="expandAll()">⊞</button>
                    </div>
                </div>
                <div id="projectTree" class="project-tree">
                    <div class="tree-empty">Build index to view project files</div>
                </div>
            </div>

            <!-- 中间搜索+结果面板 -->
            <div class="center-panel">
                <!-- 搜索面板 -->
                <div class="search-panel">
                    <div class="search-panel-header">
                        <span class="search-panel-title">Find in Path</span>
                        <button class="close-btn" onclick="clearSearch()">✕</button>
                    </div>
                    <div class="search-input-row">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="Text to find..."
                            autocomplete="off"
                        />
                        <button id="searchBtn" class="search-execute-btn" onclick="executeSearch()">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 10-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 001.415-1.414l-3.85-3.85a1.007 1.007 0 00-.115-.1zM12 6.5a5.5 5.5 0 11-11 0 5.5 5.5 0 0111 0z"/></svg>
                        </button>
                    </div>
                    <div class="search-options">
                        <label class="search-option">
                            <input type="checkbox" id="caseSensitive" />
                            <span>Match case</span>
                        </label>
                        <label class="search-option">
                            <input type="checkbox" id="wholeWord" />
                            <span>Whole words</span>
                        </label>
                        <label class="search-option">
                            <input type="checkbox" id="useRegex" />
                            <span>Regex</span>
                        </label>
                    </div>
                </div>

                <!-- 搜索结果面板 -->
                <div class="results-panel">
                    <div class="results-header">
                        <span class="results-count" id="resultsCount">No results</span>
                    </div>
                    <div id="resultsList" class="results-list">
                        <div class="results-empty">
                            <svg width="48" height="48" viewBox="0 0 16 16" fill="currentColor" opacity="0.3"><path d="M11.742 10.344a6.5 6.5 0 10-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 001.415-1.414l-3.85-3.85a1.007 1.007 0 00-.115-.1zM12 6.5a5.5 5.5 0 11-11 0 5.5 5.5 0 0111 0z"/></svg>
                            <p>Enter search text and press Enter</p>
                        </div>
                    </div>
                </div>

                <!-- 文件内容面板 -->
                <div class="file-panel">
                    <div class="file-tabs" id="fileTabs"></div>
                    <div class="file-content-area">
                        <div id="contentArea" class="content-area">
                            <div class="content-empty">
                                <p>Select a file to view its contents</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部状态栏 -->
        <div class="status-bar">
            <div class="status-bar-left">
                <span id="statusBarProject">No project loaded</span>
            </div>
            <div class="status-bar-right">
                <span id="statusBarResults"></span>
                <span id="statusBarTime"></span>
            </div>
        </div>
    </div>

    <!-- 索引构建对话框 -->
    <div id="indexDialog" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-header">
                <span class="modal-title">Index Project</span>
                <button class="modal-close" onclick="closeIndexDialog()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="projectDir">Project Directory</label>
                    <div class="input-row">
                        <input type="text" id="projectDir" placeholder="E:\projects\my-project" />
                        <button class="browse-btn" onclick="browseDirectory()">Browse</button>
                    </div>
                </div>
                <div class="form-hint">
                    Select the root directory of the project you want to index.
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeIndexDialog()">Cancel</button>
                <button id="indexBtn" class="btn btn-primary" onclick="buildIndex()">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm1 10H7V7h2v4zm0-6H7V3h2v2z"/></svg>
                    Build Index
                </button>
            </div>
        </div>
    </div>

    <!-- 进度覆盖层 -->
    <div id="progressOverlay" class="progress-overlay">
        <div class="progress-content">
            <div class="progress-spinner"></div>
            <div class="progress-text" id="progressText">Indexing...</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
